---
layout: default
---

<div class="category-page">
  <h1>{{ page.title }}</h1>
  <div class="post-list">
    {% assign cat_posts = site.posts | where: "categories", page.category %}
    {% for post in cat_posts %}
    <a href="{{ site.baseurl }}{{ post.url }}" class="post-item">
      {% if post.image %}
      <div class="post-thumb" style="background-image: url('{{ site.baseurl }}/assets/img/{{ post.image }}')"></div>
      {% endif %}
      <div class="post-info">
        <span class="post-title">{{ post.title }}</span>
        <span class="post-meta">{{ post.date | date: "%Y.%m.%d" }}</span>
      </div>
    </a>
    {% endfor %}
  </div>
</div>
