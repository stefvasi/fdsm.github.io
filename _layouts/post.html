---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <time>{{ page.date | date: "%Y.%m.%d" }}</time>
  </header>
  {% if page.image %}
  <div class="post-image">
    <img src="{{ site.baseurl }}/assets/img/{{ page.image }}" alt="{{ page.title }}">
  </div>
  {% endif %}
  <div class="post-body">
    {{ content }}
  </div>
</article>
